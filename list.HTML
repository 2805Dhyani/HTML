<!DOCTYPE html>
,<html>
    <head>
        <title>lists</title>
    </head>
    <body>
        <h2>An ordered HTML list:</h2>
        <ol>
            <li>First item</li>
            <li>Second item</li>
            <li>Thrid item</li>
            <li>Fourth item</li>
        </ol>

        <h2>An unordered HTML list:</h2>
        <ul>
            <li>item</li>
            <li>item</li>
            <li>item</li>
            <li>item</li>
        </ul>

        <h2>Defination list:</h2>
        <dl>
            <dt>Tea</dt>
            <dd>Hot Drink</dd>
            <dt>Juice</dt>
            <dd>Cold Drink</dd>
        </dl>
       
    </body>
</html>
