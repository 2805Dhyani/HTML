<!DOCTYPE html>
<html>
    <head>
        <title>My zoo</title>
        <style>
            body {
                font-family: Arial,sans-serif;
                background : aliceblue;
                text-align : centre;
                padding: 30px;
            }
            h1 {
                colour: #ff5a43
            }
            #zoo {
                border: 2px soild #ff5a43;
                width: 300px;
                margin: 16px auto;
                padding: 12px;
                border-radius: 10px;
                background: white;

            }

            Zone{
                border: 1px soild #ff5a43;
                margin: 6px 0;
                padding: 8px 12px;
                border-radius: 6px;
                text-align: left;
            }
            button {
                background: #ff5a43;
                color: white;
                padding: 10px 24px;
                border: none;
                border-radius: 20px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <h1>My Zoo</h1>
        <p>Use Javascript and DOM to add the animals to each cage!</p>

        <div id="Zoo">
            <div class="zone">Zone 1: <span id="zone 1"></span></div>

            <div class="zone">Zone 2: <span id="zone 2"></span></div>

            <div class="zone">Zone 3: <span id="zone 3"></span></div>

            <div class="zone">Total animals: <span id="total"></span></div>
        </div>

        <br>
        <button onclick="openZoo()">Open the Zoo!</button>

        <p id="zoo-status"></p>
        <script>
            function openZoo() {
                document.getElementById("zone 1").innerHTML="Lion";

                document.getElementById("zone 2").innerHTML = "Elephant";

                document.getElementById("zone 3").innerHTML = "penguin";

                document.getElementById("total").innerHTML = "3";

                document.getElementById("Zoo").style.backgroundColor = "lightgreen";

                document.getElementById("zoo-status").innerHTML=document.title + " is now open"


            }

        </script>
    </body>
</html>
